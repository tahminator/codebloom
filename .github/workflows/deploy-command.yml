name: Deploying to staging
run-name: Deploying to staging triggered by ${{ inputs.author }}

concurrency:
  group: deploy-staging-pr-${{ inputs.prId }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      prId:
        description: "PR to deploy"
        required: true
      repository:
        description: "The repository from which the slash command was dispatched"
        required: true
      comment-id:
        description: "The comment-id of the slash command"
        required: true
      author:
        description: "The author that triggered this actions"
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write
  statuses: write

jobs:
  getPRHead:
    name: Get PR head SHA
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.pr-head.outputs.result }}
    steps:
      - name: Get PR head SHA
        id: pr-head
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const prId = ${{ inputs.prId }};
            const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: parseInt(prId, 10)
            });
             return pr.head.sha;
